    max: 4
    reason: Baseline existing occurrence; remove as the C safety refactor replaces it.
  - path: ext/makiri/xpath/mkr_xpath_funcs.c
    rule: direct_strlen
    max: 11
    reason: Baseline existing occurrence; remove as the C safety refactor replaces it.
  - path: ext/makiri/xpath/mkr_xpath_lex.c
    rule: direct_strlen
    max: 1
    reason: Baseline existing occurrence; remove as the C safety refactor replaces it.
  - path: ext/makiri/xpath/mkr_xpath_parse.c
    rule: direct_strlen
    max: 1
    reason: Baseline existing occurrence; remove as the C safety refactor replaces it.
  - path: ext/makiri/xpath/mkr_xpath_value.c
